run:
  seed: 42
  # One combined SCENIC SFT model is saved here. The two JSON files below are inputs,
  # not two separate output models. The newest checkpoint is runs/scenic-sft/latest.
  output_dir: runs/scenic-sft

model:
  base_model: runs/h20-8gpu-bert-0p2b-mlm-deepspeed/latest
  tokenizer_path: artifacts/tokenizer-chatlm-encoder-bpe-29298
  dropout: 0.1

data:
  # Main supervised prompt -> response labels.
  train_json: data/scenic/SCENIC_full_training_dataset.json
  # Auxiliary anchor/positive/negative contrastive supervision for the same model.
  # Set this to null and train.contrastive_weight to 0.0 to disable contrastive SFT.
  contrastive_json: data/scenic/SCENIC_full_anchor_positive_negative.json
  max_length: 128

train:
  epochs: 10
  max_steps: null
  batch_size: 64
  contrastive_batch_size: 64
  grad_accum_steps: 1
  learning_rate: 0.00002
  min_learning_rate: 0.000002
  warmup_ratio: 0.06
  weight_decay: 0.01
  adam_eps: 0.00000001
  max_grad_norm: 1.0
  precision: bf16
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  contrastive_weight: 0.1
  triplet_margin: 0.25
  log_every: 10
  save_every: 100
